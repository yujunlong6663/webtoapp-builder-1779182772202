name: Build Android APK

on:
  push:
    tags:
      - 'build-*'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.4'
      
      - name: Build APK
        run: gradle assembleDebug --no-daemon --stacktrace --info
      
      - name: Rename APK
        run: |
          mkdir -p app/output
          find app/build/outputs/apk -name "*.apk" -type f | head -1 | xargs -I {} cp {} app/output/output.apk
      
      - name: Upload APK to Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ github.ref_name }}
          files: app/output/output.apk
          name: WebToApp Build ${{ github.ref_name }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
